<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekend da Pendoli - GG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a2332;
            --accent-purple: #5d4e8f;
            --accent-red: #c41e3a;
            --accent-orange: #d97638;
            --accent-yellow: #c9a638;
            --accent-green: #5d8e5d;
            --bg-light: #f9f6f0;
            --text-dark: #2c2416;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #e8dcc8;
            background-image: url('assets/sfondo_italia.png');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: var(--text-dark);
            line-height: 1.6;
            min-height: 100vh;
            position: relative;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Header */
        header {
            text-align: center;
            padding: 40px 20px 30px;
            margin-bottom: 40px;
            position: relative;
        }
        
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 600;
            font-style: italic;
            color: var(--primary);
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            /* letter-spacing: 2px; */
        }
        
        .date {
            font-size: clamp(1rem, 3vw, 1.5rem);
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 8px;
            /* letter-spacing: 1px; */
        }
        
        header small {
            font-size: 0.9rem;
            color: #666;
            font-style: italic;
        }
        
        /* Tabella Comparativa */
        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            color: var(--primary);
            text-align: center;
            margin: 40px 0 30px;
            font-style: italic;
        }
        
        .table-container {
            overflow-x: auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            margin-bottom: 50px;
            border: 2px solid #d4c5a9;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: clamp(0.75rem, 2vw, 0.95rem);
        }
        
        th, td {
            padding: 16px 12px;
            text-align: center;
            border-bottom: 1px solid #e8dcc8;
        }
        
        thead th {
            background: linear-gradient(135deg, var(--primary) 0%, #2c3a4f 100%);
            color: white;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: clamp(0.7rem, 2vw, 0.85rem);
            position: sticky;
            top: 0;
        }
        
        .sticky-col {
            position: sticky;
            left: 0;
            background: rgba(248, 249, 250, 0.98);
            font-weight: 700;
            text-align: left;
            z-index: 2;
            border-right: 2px solid #e8dcc8;
        }
        
        thead .sticky-col {
            z-index: 3;
            background: linear-gradient(135deg, var(--primary) 0%, #2c3a4f 100%);
        }
        
        tbody tr:hover {
            background-color: rgba(217, 118, 56, 0.08);
        }
        
        /* Card Opzioni */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }
        
        .option-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            overflow: hidden;
            border: none;
            border-left: 10px solid;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .option-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
        }

        .option-card.ultra { border-left-color: var(--accent-purple); }
        .option-card.molto { border-left-color: var(--accent-red); }
        .option-card.abbastanza { border-left-color: var(--accent-orange); }
        .option-card.appena { border-left-color: var(--accent-yellow); }
        .option-card.non { border-left-color: var(--accent-green); }

        .card-header {
            padding: 25px 25px 20px;
            color: var(--text-dark);
            position: relative;
        }

        .option-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.3rem, 3vw, 1.6rem);
            font-weight: 700;
            margin-bottom: 4px;
        }

        .option-subtitle {
            font-size: clamp(0.8rem, 2vw, 0.9rem);
            color: #6b5d4f;
            font-style: italic;
        }

        .ultra .option-title { color: var(--accent-purple); }
        .molto .option-title { color: var(--accent-red); }
        .abbastanza .option-title { color: var(--accent-orange); }
        .appena .option-title { color: var(--accent-yellow); }
        .non .option-title { color: var(--accent-green); }
        
        .card-body {
            padding: 25px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            background: linear-gradient(135deg, #fdf8f0 0%, #f9f3e8 100%);
            padding: 18px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #e8dcc8;
        }
        
        .stat-item {
            font-size: clamp(0.85rem, 2vw, 0.95rem);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .stat-item::before {
            font-size: 1.1em;
        }
        
        .itinerary {
            list-style: none;
            padding: 0;
            flex: 1;
            font-size: clamp(0.85rem, 2vw, 0.95rem);
            line-height: 1.8;
        }
        
        .itinerary li {
            margin-bottom: 12px;
            padding-left: 28px;
            position: relative;
        }
        
        .itinerary li::before {
            content: "→";
            position: absolute;
            left: 0;
            font-weight: bold;
            font-size: 1.3em;
        }
        
        .ultra .itinerary li::before { color: var(--accent-purple); }
        .molto .itinerary li::before { color: var(--accent-red); }
        .abbastanza .itinerary li::before { color: var(--accent-orange); }
        .appena .itinerary li::before { color: var(--accent-yellow); }
        .non .itinerary li::before { color: var(--accent-green); }
        
        .itinerary strong {
            font-weight: 700;
            color: var(--primary);
        }
        
        .pro-con {
            margin-top: 20px;
            font-size: clamp(0.85rem, 2vw, 0.95rem);
            padding-top: 18px;
            border-top: 2px dashed #d4c5a9;
            line-height: 1.9;
        }
        
        .pro-con div {
            margin-bottom: 8px;
        }
        
        .price {
            font-size: clamp(1.2rem, 3vw, 1.5rem);
            font-weight: 700;
            text-align: right;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px solid #e8dcc8;
        }
        
        .ultra .price { color: var(--accent-purple); }
        .molto .price { color: var(--accent-red); }
        .abbastanza .price { color: var(--accent-orange); }
        .appena .price { color: var(--accent-yellow); }
        .non .price { color: var(--accent-green); }
        
        /* Footer */
        footer {
            text-align: center;
            font-size: clamp(0.8rem, 2vw, 0.95rem);
            font-weight: 600;
            color: var(--primary);
            margin-top: 60px;
            padding: 30px 20px;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .options-grid {
                grid-template-columns: 1fr;
            }
            
            .stats {
                grid-template-columns: 1fr;
            }
            
            header {
                padding: 30px 15px 20px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Weekend da Pendoli</h1>
        <div class="date">30 Aprile – 3 Maggio 2026</div>
    </header>

    <h2 class="section-title">Le Opzioni a Confronto</h2>
    <div id="options-grid" class="options-grid"></div>

    <section>
        <h2 class="section-title">Recap Comparativo</h2>
        <div class="table-container">
            <table id="recap-table">
                <thead><tr><th class="sticky-col">Criterio</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </section>

    <footer>
        © 2025 - Goodfellas Getaways
    </footer>
</div>

<script src="config.js"></script>
<script>
    // --- Render cards ---
    const grid = document.getElementById('options-grid');
    const cardStats = tableRows.filter(r => r.card);

    options.forEach(opt => {
        const statsHtml = cardStats.map(r =>
            `<div class="stat-item">${r.emoji} ${opt.stats[r.key]} ${r.unit}</div>`
        ).join('');

        const itineraryHtml = opt.itinerary.map(item =>
            `<li>${item}</li>`
        ).join('');

        const proConHtml = [
            ...opt.pros.map(p => `<div>✅ ${p}</div>`),
            ...opt.cons.map(c => `<div>❌ ${c}</div>`),
        ].join('');

        grid.insertAdjacentHTML('beforeend', `
            <div class="option-card ${opt.id}">
                <div class="card-header">
                    <div class="option-title">${opt.title}</div>
                    <div class="option-subtitle">${opt.subtitle}</div>
                </div>
                <div class="card-body">
                    <div class="stats">${statsHtml}</div>
                    <ul class="itinerary">${itineraryHtml}</ul>
                    <div class="pro-con">${proConHtml}</div>
                    <div class="price">${opt.price}</div>
                </div>
            </div>
        `);
    });

    // --- Render table ---
    const thead = document.querySelector('#recap-table thead tr');
    const tbody = document.querySelector('#recap-table tbody');

    options.forEach(opt => {
        thead.insertAdjacentHTML('beforeend', `<th>${opt.tableLabel}</th>`);
    });

    tableRows.forEach(row => {
        const cells = options.map(opt => `<td>${opt.stats[row.key]}</td>`).join('');
        tbody.insertAdjacentHTML('beforeend',
            `<tr><td class="sticky-col">${row.label}</td>${cells}</tr>`
        );
    });
</script>

</body>
</html>
